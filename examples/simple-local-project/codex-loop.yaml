{
  "version": 1,
  "project": {
    "name": "simple-local-project"
  },
  "goal": {
    "summary": "Build a command-line todo list tool in Python with JSON storage.",
    "done_when": [
      "python todo.py add, list, done, delete all work correctly.",
      "python -m pytest tests/ -q passes with no failures."
    ]
  },
  "execution": {
    "sandbox": "workspace-write",
    "approval": "never",
    "max_iterations": 20,
    "max_no_progress_iterations": 4,
    "max_consecutive_runner_failures": 3,
    "max_consecutive_verification_failures": 0,
    "iteration_timeout_seconds": 1800,
    "iteration_backoff_seconds": 0.0,
    "iteration_backoff_jitter_seconds": 0.0,
    "resume_fallback_to_fresh": true,
    "worktree": {
      "enabled": true,
      "branch_prefix": "codex-loop/"
    }
  },
  "codex": {
    "model": "gpt-5.4",
    "use_json": true,
    "output_schema": ".codex-loop/agent_result.schema.json"
  },
  "verification": {
    "commands": [
      "python -m pytest tests/ -q"
    ],
    "pass_requires_all": true
  },
  "tasks": {
    "strategy": "sequential",
    "source_dir": "tasks"
  },
  "logging": {
    "save_prompts": true,
    "save_jsonl": true
  },
  "operator": {
    "events": {
      "default_limit": 20
    },
    "cleanup": {
      "keep": 10,
      "older_than_days": null,
      "directory_keep": {
        "logs": 20
      },
      "directory_older_than_days": {
        "prompts": 30
      }
    }
  },
  "hooks": {
    "post_init": [],
    "pre_iteration": [],
    "post_iteration": [],
    "on_completed": [],
    "on_blocked": [],
    "failure_policy": "ignore",
    "timeout_seconds": 300
  }
}
